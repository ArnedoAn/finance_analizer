name: Build, Push and Deploy (GHCR)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: finance-analyzer
  IMAGE: ghcr.io/${{ github.repository_owner }}/finance-analyzer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Webhook
        run: |
          if [ -z "${{ vars.COOLIFY_URL }}" ]; then
            echo "COOLIFY_URL no esta configurada en variables del repositorio. Omitiendo deploy."
            exit 0
          fi
          if [ -z "${{ secrets.COOLIFY_TOKEN }}" ]; then
            echo "COOLIFY_TOKEN no esta configurado en secrets del repositorio. Omitiendo deploy."
            exit 0
          fi

          echo "Triggering deployment on Coolify..."
          curl --fail --silent --show-error --location -X POST "${{ vars.COOLIFY_URL }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
          echo "Webhook sent!"
